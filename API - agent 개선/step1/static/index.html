<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>냉장고 재료 인식</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 80px 16px 40px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px;
    width: 100%;
    max-width: 620px;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #6b7280;
    font-size: 0.95rem;
    margin-bottom: 32px;
  }

  /* ── 업로드 존 ── */
  #drop-zone {
    border: 2px dashed #c3d0e5;
    border-radius: 14px;
    background: #f8faff;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  #drop-zone.drag-over {
    border-color: #4f7df3;
    background: #eef3ff;
  }
  #drop-zone.has-preview {
    padding: 0;
    border-color: #4f7df3;
    overflow: hidden;
  }
  #drop-zone .icon { font-size: 2.4rem; margin-bottom: 12px; }
  #drop-zone .hint { color: #6b7280; font-size: 0.9rem; margin-top: 6px; }
  #drop-zone .hint span { color: #4f7df3; font-weight: 600; }
  #file-input { display: none; }

  #preview {
    display: none;
    width: 100%;
    max-height: 320px;
    object-fit: contain;
    border-radius: 12px;
  }
  #drop-zone.has-preview #preview { display: block; }
  #drop-zone.has-preview .upload-guide { display: none; }

  .change-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.8rem;
    cursor: pointer;
    display: none;
  }
  #drop-zone.has-preview .change-btn { display: block; }

  /* ── 분석 버튼 ── */
  #analyze-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: #4f7df3;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }
  #analyze-btn:disabled { background: #a0b4e8; cursor: not-allowed; }
  #analyze-btn:not(:disabled):hover { background: #3a68e0; }

  /* ── 로딩 ── */
  #loading {
    display: none;
    align-items: center;
    gap: 12px;
    margin-top: 24px;
    padding: 16px;
    background: #f0f4ff;
    border-radius: 10px;
    color: #4f7df3;
    font-size: 0.95rem;
    font-weight: 500;
  }
  .spinner {
    width: 22px; height: 22px;
    border: 3px solid #c3d0f8;
    border-top-color: #4f7df3;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 오류 메시지 ── */
  #error-box {
    display: none;
    margin-top: 20px;
    padding: 14px 16px;
    background: #fff0f0;
    border: 1px solid #fca5a5;
    border-radius: 10px;
    color: #b91c1c;
    font-size: 0.9rem;
  }

  /* ── 결과 영역 ── */
  #result-section {
    display: none;
    margin-top: 28px;
  }
  #result-section h2 {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 14px;
  }

  /* ── 태그(칩) ── */
  #tags-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    min-height: 36px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #eef3ff;
    color: #2d4fa3;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.88rem;
    font-weight: 500;
  }
  .tag button {
    background: none;
    border: none;
    color: #7a99e3;
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 0;
    display: flex;
    align-items: center;
  }
  .tag button:hover { color: #e63946; }

  /* ── 재료 추가 인풋 ── */
  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .add-row input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid #d1d9f0;
    border-radius: 10px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-row input:focus { border-color: #4f7df3; }
  .add-row button {
    padding: 10px 18px;
    background: #eef3ff;
    color: #4f7df3;
    border: 1.5px solid #c3d0f8;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .add-row button:hover { background: #dde8ff; }

  /* ── 레시피 버튼 ── */
  #recipe-btn {
    display: block;
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #4f7df3, #7c5cf6);
    color: #fff;
    font-size: 1.05rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #recipe-btn:hover { opacity: 0.9; }
  #recipe-btn .arrow { margin-left: 8px; }
</style>
</head>
<body>
<div class="card">
  <h1>🧊 냉장고 재료 인식</h1>
  <p class="subtitle">냉장고 사진을 업로드하면 AI가 재료를 자동으로 인식합니다.</p>

  <!-- 업로드 존 -->
  <div id="drop-zone">
    <div class="upload-guide">
      <div class="icon">📷</div>
      <div style="font-weight:600;color:#374151;">사진을 여기에 드래그하거나</div>
      <div class="hint"><span>파일 선택</span>을 클릭하세요</div>
      <div class="hint" style="margin-top:8px;">JPEG · PNG · WEBP · 최대 10MB</div>
    </div>
    <img id="preview" alt="미리보기" />
    <button class="change-btn" id="change-btn">사진 변경</button>
  </div>
  <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp" />

  <button id="analyze-btn" disabled>이미지 분석하기</button>

  <!-- 로딩 -->
  <div id="loading">
    <div class="spinner"></div>
    <span>냉장고 속 재료를 분석하고 있어요… 잠깐만 기다려 주세요.</span>
  </div>

  <!-- 오류 -->
  <div id="error-box"></div>

  <!-- 결과 -->
  <div id="result-section">
    <h2>🥕 인식된 재료</h2>
    <div id="tags-container"></div>
    <div class="add-row">
      <input type="text" id="add-input" placeholder="재료 직접 추가…" />
      <button id="add-btn">추가</button>
    </div>
    <button id="recipe-btn">레시피 추천받기 <span class="arrow">→</span></button>
  </div>
</div>

<script>
  // ── HTML 이스케이프 유틸 (AI 인식 결과의 XSS + 깨짐 방지) ────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const preview    = document.getElementById('preview');
  const changeBtn  = document.getElementById('change-btn');
  const analyzeBtn = document.getElementById('analyze-btn');
  const loading    = document.getElementById('loading');
  const errorBox   = document.getElementById('error-box');
  const resultSec  = document.getElementById('result-section');
  const tagsContainer = document.getElementById('tags-container');
  const addInput   = document.getElementById('add-input');
  const addBtn     = document.getElementById('add-btn');
  const recipeBtn  = document.getElementById('recipe-btn');

  let selectedFile = null;
  let ingredients  = [];

  // ── 파일 선택 트리거 ──
  dropZone.addEventListener('click', (e) => {
    if (e.target === changeBtn) return;
    fileInput.click();
  });
  changeBtn.addEventListener('click', () => fileInput.click());

  // ── 드래그 앤 드롭 ──
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function handleFile(file) {
    const allowed = ['image/jpeg','image/png','image/webp'];
    if (!allowed.includes(file.type)) {
      showError('지원하지 않는 형식입니다. JPEG, PNG, WEBP 파일을 선택하세요.');
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      showError('파일 크기가 10MB를 초과합니다.');
      return;
    }
    selectedFile = file;
    hideError();
    hideResult();

    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      dropZone.classList.add('has-preview');
      analyzeBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  }

  // ── 분석 요청 ──
  analyzeBtn.addEventListener('click', async () => {
    if (!selectedFile) return;

    setLoading(true);
    hideError();
    hideResult();

    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
      const resp = await fetch('/api/recognize', { method: 'POST', body: formData });
      const data = await resp.json();

      if (resp.ok && data.success) {
        ingredients = [...data.ingredients];
        renderTags();
        resultSec.style.display = 'block';
      } else {
        const msg = data.detail || data.error || '알 수 없는 오류가 발생했습니다.';
        showError(msg.includes('429') || msg.includes('혼잡')
          ? '현재 AI 서버가 혼잡합니다. 잠시 후 다시 시도해주세요.'
          : `오류: ${msg}`);
      }
    } catch (err) {
      showError('네트워크 오류가 발생했습니다. 인터넷 연결을 확인하세요.');
    } finally {
      setLoading(false);
    }
  });

  // ── 태그 렌더링 ──
  function renderTags() {
    tagsContainer.innerHTML = '';
    if (ingredients.length === 0) {
      tagsContainer.innerHTML = '<span style="color:#9ca3af;font-size:0.9rem;">인식된 재료가 없습니다. 직접 추가해주세요.</span>';
      return;
    }
    ingredients.forEach((name, idx) => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = `${esc(name)}<button aria-label="${esc(name)} 삭제" data-idx="${idx}">✕</button>`;
      tag.querySelector('button').addEventListener('click', () => {
        ingredients.splice(idx, 1);
        renderTags();
      });
      tagsContainer.appendChild(tag);
    });
  }

  // ── 재료 추가 ──
  function addIngredient() {
    const val = addInput.value.trim();
    if (!val) return;
    if (!ingredients.includes(val)) {
      ingredients.push(val);
      renderTags();
    }
    addInput.value = '';
    addInput.focus();
  }
  addBtn.addEventListener('click', addIngredient);
  addInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addIngredient(); });

  // ── 레시피 이동 ──
  recipeBtn.addEventListener('click', () => {
    if (ingredients.length === 0) {
      showError('재료가 없습니다. 최소 1개 이상의 재료를 추가하세요.');
      return;
    }
    sessionStorage.setItem('ingredients', JSON.stringify(ingredients));
    window.location.href = '/recipe';
  });

  // ── 유틸 ──
  function setLoading(on) {
    loading.style.display = on ? 'flex' : 'none';
    analyzeBtn.disabled = on;
  }
  function showError(msg) {
    errorBox.textContent = '⚠️ ' + msg;
    errorBox.style.display = 'block';
  }
  function hideError() { errorBox.style.display = 'none'; }
  function hideResult() { resultSec.style.display = 'none'; }
</script>
<script src="/header.js"></script>
</body>
</html>
